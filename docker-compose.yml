version: '3.8'

# Tworzymy wewnętrzną, wirtualną sieć, żeby nasze kontenery mogły ze sobą rozmawiać
networks:
  veturilo-network:
    driver: bridge

services:
  # --- APACHE KAFKA (Serwer do przesyłania danych w czasie rzeczywistym) ---
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: veturilo-kafka
    ports:
      - "9092:9092" # Udostępniamy port 9092 dla skryptów Python na komputerze (host)
    networks:
      - veturilo-network
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data' # DevOps: Zmieniono na persistent ścieżkę z wolumenu
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data # DevOps: Persystencja logów Kafki
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- BAZA DANYCH POSTGRESQL (Tu lądują gotowe dane do wykresów) ---
  postgres:
    image: postgres:15
    container_name: veturilo-postgres
    ports:
      - "5432:5432" # Port bazy danych na hoście
    networks:
      - veturilo-network
    environment:
      POSTGRES_USER: veturilo_user
      POSTGRES_PASSWORD: veturilo_password
      POSTGRES_DB: veturilo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data # Wolumen dla danych PostgreSQL
      - ./postgres-init/init.sql:/docker-entrypoint-initdb.d/init.sql # DevOps: Automatyczna inicjalizacja tabel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veturilo_user -d veturilo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- METABASE (Narzędzie BI do wizualizacji i tworzenia dashboardów) ---
  metabase:
    image: metabase/metabase:v0.46.6
    container_name: veturilo-metabase
    ports:
      - "3000:3000" # Udostępniamy port 3000 dla przeglądarki na http://localhost:3000
    networks:
      - veturilo-network
    environment:
      MB_DB_FILE: /metabase-data/metabase.db # Ścieżka do wbudowanej bazy H2 w Metabase
    volumes:
      - metabase_data:/metabase-data # DevOps: Persystencja konfiguracji i dashboardów Metabase
    depends_on:
      postgres:
        condition: service_healthy # Metabase włączy się dopiero, gdy Postgres będzie w pełni gotowy
      kafka:
        condition: service_healthy

# Wolumeny sprawiają, że dane zapisane w bazie, kafce i metabase nie znikną, kiedy wyłączysz kontenery
volumes:
  postgres_data:
  kafka_data:
  metabase_data: